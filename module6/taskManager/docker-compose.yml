version: '3.8'

services:
  # ── SQL Server 2022 database ─────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64 # required on Apple Silicon
    container_name: taskmanager-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:?Error: SA_PASSWORD not set. Create a .env file}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - taskmanager-net
    healthcheck:
      # $$ escapes the $ so the container shell expands the variable at runtime
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── db-init: create trainingdb once SQL Server is healthy ─────
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: taskmanager-db-init
    depends_on:
      db:
        condition: service_healthy
    networks:
      - taskmanager-net
    environment:
      SQL_PASSWORD: ${SA_PASSWORD}
    # USE THIS EXACT SYNTAX (The pipe | or > is important)
    command: >
      /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P ${SA_PASSWORD} -C
      -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'trainingdb') CREATE DATABASE trainingdb;"

  # ── Spring Boot application ───────────────────────────────────
  app:
    build: .
    image: taskmanager:1.0
    container_name: taskmanager-app
    ports:
      - "8080:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:sqlserver://db:1433;databaseName=trainingdb;encrypt=true;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ${SA_PASSWORD}
      JAVA_OPTS: "-Xmx512m"
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - taskmanager-net
    restart: on-failure

volumes:
  mssql-data:

networks:
  taskmanager-net:
    driver: bridge