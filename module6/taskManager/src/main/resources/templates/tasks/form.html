<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Task Form</title>
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>

<body>
<header th:replace="~{fragments/nav :: navbar}"></header>

<main class="container">
    <h2 th:text="${pageTitle}">New Task</h2>

    <form th:action="@{/tasks}" th:object="${task}" method="post" class="task-form">

        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" th:field="*{title}" placeholder="Enter task title">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea th:field="*{description}" rows="4"></textarea>
        </div>

        <div class="form-group">
            <label for="priority">Priority</label>
            <select th:field="*{priority}">
                <option value="LOW">Low</option>
                <option value="MEDIUM">Medium</option>
                <option value="HIGH">High</option>
                <option value="URGENT">Urgent </option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Save Task</button>
        <a th:href="@{/tasks}" class="btn btn-secondary">Cancel</a>

    </form>
</main>
</body>
</html>
