<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Task Details</title>
    <link th:href="@{/css/main.css}" rel="stylesheet">
    <script th:inline="javascript">
            const taskId   = [[${task.id}]];
            const taskDone = [[${task.done}]];
            const baseUrl  = [[@{/}]];
    </script>
</head>

<body>
<header th:replace="~{fragments/nav :: navbar}"></header>
<main class="container">
    <div class="task-detail">
        <div class="task-card">
            <p><strong>Title:</strong> <span th:text="${task.title}">Title</span></p>
            <p><strong>Assigned User:</strong> <span th:text="${task.assignedUsername}">Assigned User</span></p>
            <p><strong>Description:</strong> <span th:text="${task.description}">Description</span></p>
            <p><strong>Priority:</strong> <span th:text="${task.priority}">Priority</span></p>
            <p><strong>Status:</strong> <span th:text="${task.status}">Status</span></p>
            <p><strong>ID:</strong> <span th:text="${task.id}">ID</span></p>
            <div class="task-actions">
                <a class="btn btn-secondary" th:href="@{/tasks}">Back</a>
                <a class="btn btn-primary" th:href="@{/tasks/{id}/edit(id=${task.id})}">Edit</a>
                <button class="btn btn-complete"
                        th:unless="${task.status.name() == 'COMPLETED'}"
                        th:attr="data-task-id=${task.id}">
                    Mark Complete
                </button>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
