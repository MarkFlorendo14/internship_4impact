<!-- src/main/resources/templates/layout/base.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' | TaskManager'">TaskManager</title>
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>

<body>
    <header th:replace="~{fragments/nav :: navbar}"></header>

        <main class="container">
            <!-- Each page inserts its content here via th:replace -->
            <div th:fragment="content">Page content goes here</div>
        </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script th:src="@{/js/main.js}" defer></script>
</body>
</html>
