# This profile is activated when SPRING_PROFILES_ACTIVE=docker
# All settings here OVERRIDE application.properties when running in Docker.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# Required for SQL Server: run data.sql on every startup (idempotent guards in
# the SQL).
spring.sql.init.mode=always

# Make Hibernate create the schema BEFORE data.sql runs so the INSERTs find the tables.
spring.jpa.defer-datasource-initialization=true

# Tell Spring Boot this is a SQL Server data source (used for platform-specific scripts).
spring.sql.init.platform=mssql

# Graceful shutdown ? give Spring Boot time to close connections cleanly
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Log to stdout only (containers stream stdout to 'docker logs')
logging.file.name=
